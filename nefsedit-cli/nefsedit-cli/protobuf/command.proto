edition = "2023";

package NefsEditCLI.Protocol;
option java_package = "io.github.tmarsteel.flyingnarrator.nefs.protocol";

message ToNefsEdit {
  oneof command {
    ListItemsCommand list_items = 1;
    ReadItemCommand read_item = 2;
    ExitCommand exit = 200;
  }
}

message FromNefsEdit {
  oneof result {
    FileOpenAcknowledgement open_ack = 4;
    ErrorResult error = 1;
    ListItemsResult listed_items = 2;
    ReadItemResult item = 3;
  }
}

message ListItemsCommand {
  uint32 directory_id = 1 [features.field_presence = EXPLICIT];
  bool recursive = 2 [default = false];
}

message ReadItemCommand {
  uint32 id = 1 [features.field_presence = IMPLICIT];
  Conversion convert = 2 [features.field_presence = EXPLICIT];
}

enum Conversion {
  UNPACK_BINARY_XML = 0;
  LANGUAGE_FILE_TO_XML = 1;
  PKG_TO_JSON = 2;
  TPK_TO_DDS = 3;
}

message FileOpenAcknowledgement {
  bool success = 1 [features.field_presence = LEGACY_REQUIRED];
}

message ListItemsResult {
  repeated ListedItem items = 1;
}

message ListedItem {
  uint32 id = 1 [features.field_presence = IMPLICIT];
  bool is_directory = 5 [default = false];
  string full_path = 2 [features.field_presence = IMPLICIT];
  string file_name = 3 [features.field_presence = IMPLICIT];
  uint32 size = 4 [features.field_presence = IMPLICIT];
  repeated uint32 ids_of_duplicates = 20;
}

message ReadItemResult {
  bytes data = 1 [features.field_presence = LEGACY_REQUIRED];
}

message ExitCommand {}

message ErrorResult {
  string message = 1 [features.field_presence = LEGACY_REQUIRED];
}