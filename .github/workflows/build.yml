name: build.yml
on:
  push:

jobs:
  opus-build:
    uses: ./.github/workflows/build-opus.yml
  gradle:
    runs-on: ubuntu-24.04
    needs:
      - opus-build
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'openjdk'
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: 'basic'
      - name: gradle clean
        run: ./gradlew clean
      - name: get-opus-shared-libs
        id: opus-libs
        uses: actions/download-artifact@v8.0.1
        with:
          run-id: ${{ needs.opus-build.run-id }}
          name: opus-x86_64-w64-mingw32
          path: ${{ github.workspace }}/build/native-libs/opus/x64-windows
      - name: gradle build
        run: ./gradlew build