name: build.yml
on:
  push:

jobs:
  opus-build:
    uses: ./.github/workflows/build-opus.yml
  nefscli-build:
    uses: ./.github/workflows/build-nefsedit-cli.yml
  gradle:
    runs-on: ubuntu-24.04
    needs:
      - opus-build
      - nefscli-build
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: 'basic'
      - name: gradle clean
        run: ./gradlew clean
      - name: get-opus-shared-libs
        id: opus-libs
        uses: actions/download-artifact@v8.0.1
        with:
          run-id: "${{ needs.opus-build.run-id }}"
          name: opus-x86_64-w64-mingw32
          path: "${{ github.workspace }}/build/native-libs/opus/win-x64"
      - name: get-nefsedit-cli
        id: nefsedit-cli
        uses: actions/download-artifact@v8.0.1
        with:
          run-id: "${{ needs.nefscli-build.run-id }}"
          name: nefsedit-cli-win-x64
          path: "${{ github.workspace }}/build/native-libs/nefsedit-cli/win-x64"
      - name: gradle build
        run: ./gradlew build